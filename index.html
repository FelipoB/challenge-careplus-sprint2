<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care(Us) — Login</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="mb-4">
      <h2 class="fw-black mb-0" style="color: var(--cp-blue); font-size: 28px;">
        Care<span style="color: var(--cp-cyan);">(Us)</span>
      </h2>
      <p class="text-muted small mb-0">by CarePlus Clinics — Part of Bupa</p>
    </div>

    <!-- ETAPA 1: CPF -->
    <div id="stepCpf">
      <h5 class="fw-bold mb-1">Bem-vindo(a)!</h5>
      <p class="text-muted small mb-4">Para começar, informe seu CPF.</p>

      <div class="mb-3">
        <label class="form-label fw-bold small text-uppercase" style="color: var(--cp-gray-text); letter-spacing: .5px;">CPF *</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-id-card text-muted"></i></span>
          <input type="text" class="form-control" id="cpfInput" placeholder="000.000.000-00" maxlength="14">
        </div>
      </div>

      <button class="btn btn-cp-primary btn-lg w-100 mb-3" onclick="checkCPF()">
        Próximo <i class="fas fa-arrow-right ms-2"></i>
      </button>

      <div class="text-center">
        <small class="text-muted">Novo por aqui? </small>
        <a href="#" class="fw-bold small" style="color: var(--cp-blue);" onclick="showStep('stepCadastro')">Criar conta</a>
      </div>
    </div>

    <!-- ETAPA 2: Senha -->
    <div id="stepSenha" class="d-none">
      <div class="text-center mb-4">
        <div class="rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center fw-black text-white"
             style="width:64px;height:64px;background:linear-gradient(135deg,var(--cp-blue),var(--cp-cyan));font-size:24px;">A</div>
        <h5 class="fw-bold mb-0">Bem-vinda, Ana!</h5>
        <p class="text-muted small">Digite sua senha para entrar</p>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold small text-uppercase" style="color: var(--cp-gray-text); letter-spacing: .5px;">Senha *</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
          <input type="password" class="form-control" id="senhaInput" placeholder="••••••••">
          <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="keepConnected">
        <label class="form-check-label small" for="keepConnected">Permanecer conectado</label>
      </div>

      <button class="btn btn-cp-primary btn-lg w-100 mb-3" onclick="doLogin()">
        <i class="fas fa-sign-in-alt me-2"></i> Entrar
      </button>

      <div class="d-flex justify-content-center gap-3">
        <a href="#" class="small" style="color: var(--cp-blue);" onclick="showStep('stepCpf')">Voltar</a>
        <span class="text-muted small">·</span>
        <a href="#" class="small" style="color: var(--cp-blue);">Esqueci a senha</a>
      </div>
    </div>

    <!-- ETAPA 3: Cadastro -->
    <div id="stepCadastro" class="d-none">
      <div class="d-flex align-items-center gap-2 mb-4">
        <a href="#" onclick="showStep('stepCpf')" class="text-decoration-none" style="color: var(--cp-blue);">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h5 class="fw-bold mb-0">Criar Conta</h5>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold small">CPF *</label>
          <input type="text" class="form-control" placeholder="000.000.000-00" maxlength="14">
        </div>
        <div class="col-12">
          <label class="form-label fw-bold small">Nome Completo *</label>
          <input type="text" class="form-control" placeholder="Seu nome completo">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold small">E-mail *</label>
          <input type="email" class="form-control" placeholder="email@exemplo.com">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold small">Telefone *</label>
          <input type="text" class="form-control" placeholder="(11) 99999-0000">
        </div>
        <div class="col-md-8">
          <label class="form-label fw-bold small">CEP *</label>
          <input type="text" class="form-control" placeholder="00000-000">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold small">Número</label>
          <input type="text" class="form-control" placeholder="42">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold small">Data de Nascimento *</label>
          <input type="date" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold small">Tipo Sanguíneo</label>
          <select class="form-select">
            <option value="">Selecione</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold small">Alergias</label>
          <input type="text" class="form-control" placeholder="Ex: Dipirona, Penicilina">
        </div>
        <div class="col-12">
          <label class="form-label fw-bold small">Senha *</label>
          <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="col-12">
          <button class="btn btn-cp-primary btn-lg w-100"
            onclick="showToast('Conta criada! Bem-vindo(a) ao Care(Us)!','success'); setTimeout(()=>{window.location.href='home.html'},1500);">
            <i class="fas fa-check me-2"></i> Criar Conta
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- App JS -->
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    maskCPF(document.getElementById('cpfInput'));
  });

  function showStep(id) {
    ['stepCpf','stepSenha','stepCadastro'].forEach(s => {
      document.getElementById(s).classList.add('d-none');
    });
    document.getElementById(id).classList.remove('d-none');
  }

  function checkCPF() {
    const cpf = document.getElementById('cpfInput').value.replace(/\D/g,'');
    if (cpf.length !== 11) {
      showToast('CPF inválido. Verifique e tente novamente.', 'danger');
      return;
    }
    showStep('stepSenha');
  }

  function doLogin() {
    const senha = document.getElementById('senhaInput').value;
    if (!senha) { showToast('Informe sua senha.', 'danger'); return; }
    showToast('Entrando...', 'info', 900);
    setTimeout(() => { window.location.href = 'home.html'; }, 900);
  }

  function toggleSenha() {
    const input = document.getElementById('senhaInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('stepCpf').classList.contains('d-none'))    checkCPF();
    else if (!document.getElementById('stepSenha').classList.contains('d-none')) doLogin();
  });
</script>
</body>
</html>
